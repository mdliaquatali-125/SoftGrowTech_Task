<!DOCTYPE html>
<html lang="en" class="h-100">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>
        Generate Password
    </title>
    <!-- Favicon icon -->
    <link href="css/style.css" rel="stylesheet">
    <link rel="stylesheet" href="css/skin.css">
</head>
<body class="h-100" style="background-image: url('image/bg.jpg'); background-size: cover; background-position: center;">
    <div class="authincation h-100">
        <div class="container h-100">
            <div class="row justify-content-center h-100 align-items-center">
                <div class="col-md-6">
                    <div class="authincation-content">
                        <div class="row no-gutters">
                            <div class="col-xl-12">
                                <div class="auth-form">
                                    <h4 class="text-center mb-4">Generate Password</h4>
                                    <div class="form-group">
                                        <label for="password">Password</label>
                                        <input type="text" id="password" class="form-control" readonly placeholder="Password">
                                    </div>
                                    <div class="form-row d-flex justify-content-between mt-4 mb-2">
                                        <div class="form-group">
                                            <div class="custom-control custom-checkbox">
                                                <input type="checkbox" class="custom-control-input" id="chkNumbers">
                                                <label class="custom-control-label" for="chkNumbers">  Numbers</label>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="form-row d-flex justify-content-between mb-2">
                                        <div class="form-group">
                                            <div class="custom-control custom-checkbox">
                                                <input type="checkbox" class="custom-control-input" id="chkSymbols">
                                                <label class="custom-control-label" for="chkSymbols">  Symbols</label>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="form-row d-flex justify-content-between mb-2">
                                        <div class="form-group">
                                            <div class="custom-control custom-checkbox">
                                                <input type="checkbox" class="custom-control-input" id="chkUppercase">
                                                <label class="custom-control-label" for="chkUppercase">  Uppercase</label>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="text-center">
                                        <button type="submit" class="btn btn-primary" onclick="generatePassword()">Generate Password</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="js/Script.js"></script>
</body>
</html>
